<div class="scene"
     [class.is-seen]="seen"
     (click)="onClick()">
  <div class="flip-wrap">
    <div class="flipper" [class.flipped]="seen">
      <!-- BACK -->
      <div class="face back">
        <div class="back-overlay">
          <span class="num">{{ num }}</span>
        </div>
      </div>
      <!-- FRONT (seen) -->
      <div class="face face-front" [style.background]="deck.cardBg || deck.backBg">
        <img class="front-img" [src]="cardImg" alt="">
        <div class="front-overlay">
          <div class="check">✓</div>
        </div>
      </div>
    </div>
  </div>
</div>
