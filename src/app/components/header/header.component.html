<header class="nq-header">
  <button class="logo" (click)="goHome()">
    <span class="logo-1">Nosy</span>
    <span class="logo-2">Questions</span>
    <span class="logo-v">2.0</span>
  </button>

  <div class="spacer"></div>

  <div class="donate">
    <span class="donate-label">{{ lang === 'es' ? 'Apoya este software' : 'Support this software' }}</span>
    <a class="donate-btn"
       href="https://www.paypal.com/donate?hosted_button_id=QMTCSHV5RNS8C"
       target="_blank" rel="noopener">
      {{ lang === 'es' ? 'Donar con PayPal' : 'Donate with PayPal' }}
    </a>
  </div>

  <div class="lang-toggle">
    <button [class.on]="lang === 'es'" (click)="setLang('es')">ES</button>
    <span class="sep">/</span>
    <button [class.on]="lang === 'en'" (click)="setLang('en')">EN</button>
  </div>

  <button class="theme-toggle"
          (click)="theme.toggle()"
          [attr.aria-label]="theme.theme === 'light' ? 'Modo oscuro' : 'Modo claro'">
    <span class="dot"></span>
  </button>

  @if (screen === 'game') {
    <button class="back-btn" (click)="goHome()">
      ← {{ lang === 'es' ? 'Mazos' : 'Decks' }}
    </button>
  }
</header>
